name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-core:
    name: Core tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run core tests
        run: pytest tests/ -v --tb=short

  test-serving:
    name: Serving API tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.7"
          cache: "pip"

      - name: Install serving dependencies
        run: pip install -r serving/requirements.txt httpx pytest

      - name: Run serving API tests
        run: pytest tests/ -v --tb=short
        working-directory: serving

      - name: Smoke-test health endpoint (mock mode — no real models needed)
        env:
          MOCK_MODELS: "true"
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 4
          curl -sf http://localhost:8000/health | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'healthy', f'Expected healthy, got {d}'
          print('Health check passed:', d)
          "
        working-directory: serving
