name: Data Collection Worker

on:
  workflow_dispatch:
    inputs:
      synthetic:
        description: 'Run with synthetic data (true/false, check if testing)'
        required: false
        default: 'false'

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        
    - name: Run Data Collection
      env:
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID || 'dummy_id' }}
        REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET || 'dummy_secret' }}
        REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT || 'dummy_agent' }}
        PRIVACY_SALT: ${{ secrets.PRIVACY_SALT || 'dummy_salt' }}
      run: |
        if [ "${{ github.event.inputs.synthetic }}" = "true" ]; then
          PYTHONPATH=. python src/pipeline/run_collect.py --synthetic
        else
          PYTHONPATH=. python src/pipeline/run_collect.py
        fi
        
    - name: Upload Extracted Data
      if: always() # Ensure artifact is uploaded even if rate limit timeout causes partial failure
      uses: actions/upload-artifact@v4
      with:
        name: raw-reddit-data
        path: data/raw/
        retention-days: 7
