name: Retrain (Synthetic) and Update Artifacts

on:
  workflow_dispatch:
    inputs:
      skip_topics:
        description: "Skip BERTopic (faster, default true for CI)"
        required: false
        default: "true"
      skip_search:
        description: "Skip XGBoost hyperparameter search (faster)"
        required: false
        default: "true"

jobs:
  retrain:
    name: Retrain with synthetic data
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow committing artifacts back to repo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.7"
          cache: "pip"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run full synthetic pipeline
        env:
          PRIVACY_SALT: ${{ secrets.PRIVACY_SALT || 'ci-salt' }}
        run: |
          SKIP_TOPICS=""
          SKIP_SEARCH=""
          [ "${{ github.event.inputs.skip_topics }}" = "true" ] && SKIP_TOPICS="--skip-topics"
          [ "${{ github.event.inputs.skip_search }}" = "true" ] && SKIP_SEARCH="--skip-search"
          python -m src.pipeline.run_all \
            --config config/default.yaml \
            --synthetic \
            $SKIP_TOPICS \
            $SKIP_SEARCH \
            --force

      - name: Commit and push updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/features/ data/models/ data/reports/ || true
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "chore: retrain synthetic artifacts [skip ci]"
          git push
